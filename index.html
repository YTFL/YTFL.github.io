<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTFL - Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 80px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: #ffffff;
        }

        .tagline {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .projects-card {
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 24px;
            background-color: #1e293b;
            text-align: left;
        }

        .projects-card h2 {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 16px;
            color: #ffffff;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }

        .project-item {
            display: block;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 16px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            background-color: #0f172a;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .project-item:hover {
            border-color: #3b82f6;
            background-color: #1e293b;
        }

        .project-desc {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            color: #94a3b8;
            margin-top: 4px;
        }

        footer {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #334155;
        }

        footer a {
            color: #3b82f6;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>YTFL</h1>
        <p class="tagline">Welcome to my GitHub Pages Hub. Here you can find my active open-source projects.</p>

        <div class="projects-card">
            <h2>Active Projects</h2>
            <a href="https://ytfl.github.io/AttendMate-Bunk-Calculator-Attendance-Tracker/" class="project-item">
                AttendMate
                <span class="project-desc">Timetable and attendance tracker with Google Calendar synchronization.</span>
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 YTFL. All rights reserved. | Contact: <a href="mailto:venkatpiyush327@gmail.com">venkatpiyush327@gmail.com</a></p>
    </footer>
</body>
</html>
